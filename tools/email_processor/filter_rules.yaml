version: 1
rules:
- id: nic-link-state-notifications
  action: discard
  priority: 105
  match:
    subject:
      contains:
      - network link is started
  name: NIC link state notifications
  reason: Server NIC link state change — pure noise
- id: patrol-read
  name: Patrol Read RAID operations
  action: discard
  priority: 100
  match:
    subject:
      contains:
      - Patrol Read
      - The Patrol Read
  reason: RAID self-test — zero informational value
- id: zabbix-problem
  name: Zabbix monitoring alerts
  action: aggregate
  aggregate_to: _review/daily/zabbix-{date}.md
  priority: 100
  match:
    subject:
      contains:
      - 'Problem:'
    from:
      contains:
      - zabbixsrv
- id: fis-technical
  name: FIS technical work
  action: keep
  label: fis-work
  priority: 100
  match:
    subject:
      contains_regex:
      - (?i)\bFIS\b
- id: predictive-failure-disk-dying
  action: keep
  priority: 100
  match:
    subject:
      contains:
      - predictive failure
  name: Predictive failure - disk dying
  reason: PREDICTIVE FAILURE = disk about to fail, requires intervention
  label: hw-issue
- id: trusted-luca-bighignoli
  action: keep
  priority: 95
  match:
    from:
      contains:
      - Luca.Bighignoli
  name: 'Trusted: Luca Bighignoli'
  reason: Colleague FIS - all emails are work
  label: fis-work
- id: trusted-ivan-dinorscia
  action: keep
  priority: 95
  match:
    from:
      contains:
      - Ivan.DiNorscia
  name: 'Trusted: Ivan DiNorscia'
  reason: Colleague FIS - all emails are work
  label: fis-work
- id: trusted-matteo-degiuseppe
  action: keep
  priority: 95
  match:
    from:
      contains:
      - Matteo.DeGiuseppe
  name: 'Trusted: Matteo DeGiuseppe'
  reason: Colleague - all emails are work
  label: fis-work
- id: trusted-donato-siravo
  action: keep
  priority: 95
  label: fis-work
  match:
    from:
      contains:
      - donato.siravo
  reason: Trusted colleague — all emails are work
- id: trusted-tommaso-trittoni
  action: keep
  priority: 95
  label: fis-work
  match:
    from:
      contains:
      - tommaso.trittoni
  reason: Trusted colleague — all emails are work
- id: trusted-stefano-francesi
  action: keep
  priority: 95
  label: fis-work
  match:
    from:
      contains:
      - Stefano.Francesi
  reason: Trusted colleague — all emails are work
- id: login-notification
  name: Login/logout notifications
  action: discard
  priority: 90
  match:
    subject:
      contains:
      - logged in using
      - session for
      - logged off
  reason: Access log — no action needed
- id: backup-failed
  name: Backup failure alerts
  action: aggregate
  aggregate_to: _review/daily/backup-{date}.md
  priority: 90
  match:
    subject:
      contains:
      - BACKUP FAILED
      - BACKUP IS NOT RESPONDING
      - ACTIVITY IS NOT RESPONDING
      - L'ATTIVITÀ NON RISPONDE
      - BACKUP manuali non eseguiti
- id: gsc-meetings
  name: GSC meetings
  action: keep
  label: meetings
  priority: 90
  match:
    subject:
      contains:
      - GSC
      - 'minutes:'
- id: idrac-state-config-requests
  action: discard
  priority: 90
  match:
    subject:
      contains:
      - requested state / configuration
  name: iDRAC state/config requests
  reason: Server management access log — no action needed
- id: company-announcements
  action: keep
  priority: 85
  match:
    subject:
      contains:
      - 'Announcement:'
  name: Company announcements
  reason: Company announcements (new hires, org changes)
  label: company
- id: daily-digest
  name: Daily Digest / Flashnews
  action: discard
  priority: 80
  match:
    subject:
      contains:
      - Daily Digest
      - Emerson Daily
      - Flashnews
      - NICE TO KNOW
  reason: Newsletter — low value
- id: safety-company
  name: Safety / Company updates
  action: keep
  label: company
  priority: 80
  match:
    subject:
      contains:
      - Safety Day
      - safety metrics
      - Company Update
      - All Employee Meeting
      - From the Desk of
- id: deltav-password-expiry-reminders
  action: discard
  priority: 80
  match:
    subject:
      contains:
      - Yet Another Password Reminder
  name: DeltaV password expiry reminders
  reason: Automated DeltaV password expiry notification
- id: ups-battery-alerts
  action: aggregate
  priority: 80
  match:
    subject:
      contains:
      - battery on shared
  name: UPS battery alerts
  reason: UPS battery charge level alerts — aggregate with hw-warnings
  aggregate_to: _review/daily/hw-warnings-{date}.md
- id: disk-media-errors
  action: aggregate
  priority: 80
  match:
    subject:
      contains:
      - disk media error
  name: Disk media errors
  reason: Disk media error corrected during recovery — informational
  aggregate_to: _review/daily/hw-warnings-{date}.md
- id: windows-domain-password-expiry
  action: discard
  priority: 80
  match:
    subject:
      contains:
      - your password will expire
  name: Windows domain password expiry
  reason: Automated domain password expiry notification
- id: spam-quarantine
  name: Spam Quarantine notifications
  action: discard
  priority: 70
  match:
    subject:
      contains:
      - ProofPoint Spam Quarantine
  reason: Spam notification
- id: alert-recap
  name: Alert recap
  action: aggregate
  aggregate_to: _review/daily/zabbix-{date}.md
  priority: 70
  match:
    subject:
      contains:
      - ALERT RECAP
- id: hr-admin
  name: HR / Admin
  action: keep
  label: admin
  priority: 70
  match:
    subject:
      contains:
      - '730'
      - should know
      - timesheet
      - giustificativi
      - form trasferte
      - expense
- id: certification-expiry-notifications
  action: keep
  priority: 70
  match:
    subject:
      contains:
      - certification expired
      - certification will expire
  name: Certification expiry notifications
  reason: Professional certification expiry alerts - requires attention
  label: admin
- id: raid-write-policy-change-notifications
  action: discard
  priority: 70
  match:
    subject:
      contains:
      - write policy on shared
  name: RAID write policy change notifications
  reason: RAID controller cache policy change — informational
- id: mcafee-av
  name: McAfee AV report
  action: discard
  priority: 60
  match:
    subject:
      contains:
      - McAfee AV
  reason: Automated report
- id: cyberark
  name: CyberArk notifications
  action: aggregate
  aggregate_to: _review/daily/security-{date}.md
  priority: 60
  match:
    subject:
      contains:
      - CyberArk
- id: sales-license
  name: Sales / License
  action: keep
  label: commerciale
  priority: 60
  match:
    subject:
      contains:
      - Sales Order
      - Acronis
      - CTS open calls
- id: learning-assignments-due
  action: keep
  priority: 60
  match:
    subject:
      contains:
      - Learning Assignments are due
  name: Learning assignments due
  reason: Training assignments deadline reminders
  label: admin
- id: backup-weekly-report
  name: Backup weekly report
  action: discard
  priority: 50
  match:
    subject:
      contains:
      - 'BACKUP REPORT:'
      - REPORT DI BACKUP
      - Rubrik Report
  reason: Automated weekly report
- id: kba
  name: KBA notifications
  action: aggregate
  aggregate_to: _review/daily/kba-{date}.md
  priority: 50
  match:
    subject:
      contains:
      - KBA
- id: emerson-field-service-report
  action: discard
  priority: 50
  match:
    subject:
      contains:
      - Emerson Field Service Report
  name: Emerson Field Service Report
  reason: Automated field service report - no action needed
- id: emerson-product-support-notifications
  action: discard
  priority: 50
  match:
    subject:
      contains:
      - Emerson Product Support
  name: Emerson Product Support notifications
  reason: Automated Guardian notifications - new reports and KB articles
- id: sharepoint-news
  name: SharePoint news
  action: discard
  priority: 40
  match:
    subject:
      contains:
      - News you might have missed
  reason: Automated notification
- id: azure-maintenance-notifications
  action: discard
  priority: 40
  match:
    subject:
      contains:
      - Ongoing Maintenance for Azure
  name: Azure maintenance notifications
  reason: Informational Azure scheduled maintenance - no action needed
- id: scheduled-maintenance-notifications
  action: discard
  priority: 40
  match:
    subject:
      contains:
      - SCHEDULED MAINTENANCE
  name: Scheduled maintenance notifications
  reason: Informational scheduled maintenance - no action needed
- id: power-automate-failure-notifications
  action: discard
  priority: 40
  match:
    subject:
      contains:
      - your flow(s) have failed
  name: Power Automate failure notifications
  reason: Microsoft Power Automate flow failures — not actionable
- id: unify-notifications
  action: discard
  priority: 40
  match:
    subject:
      contains:
      - Unify
  name: UNIFY notifications
  reason: UNIFY system notifications
- id: crm-restored
  name: CRM SERVICE RESTORED
  action: discard
  priority: 30
  match:
    subject:
      contains:
      - SERVICE RESTORED
  reason: Already resolved
- id: bank-statement-notifications
  action: discard
  priority: 20
  match:
    subject:
      contains:
      - il tuo estratto conto è pronto
  name: Bank statement notifications
  reason: Personal bank statement — not work related
- id: espp
  name: ESPP notifications
  action: discard
  priority: 10
  match:
    subject:
      contains:
      - ESPP
  reason: HR automated notification
- id: europe-business-academy-notifications
  action: discard
  priority: 10
  match:
    subject:
      contains:
      - Europe Business Academy
  name: Europe Business Academy notifications
  reason: Training opportunity - very low priority, near-spam
